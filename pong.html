<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        canvas { border: 1px solid black; }\n    </style>\n</head>\n<body>\n    <h1>Pong Game</h1>\n    <canvas id="gameCanvas" width="800" height="400"></canvas>\n    <div>\n        <h2>Scoreboard</h2>\n        <p>Player 1: <span id="player1Score">0</span></p>\n        <p>Player 2: <span id="player2Score">0</span></p>\n    </div>\n    <div>\n        <h2>Controls</h2>\n        <p>Player 1: W (Up), S (Down)</p>\n        <p>Player 2: Up Arrow (Up), Down Arrow (Down)</p>\n    </div>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let player1Y = canvas.height / 2 - 50;\n        let player2Y = canvas.height / 2 - 50;\n        let ballX = canvas.width / 2;\n        let ballY = canvas.height / 2;\n        let ballSpeedX = 5;\n        let ballSpeedY = 5;\n        let player1Score = 0;\n        let player2Score = 0;\n\n        function draw() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw paddles and ball\n            ctx.fillStyle = 'black';\n            ctx.fillRect(30, player1Y, 10, 100);\n            ctx.fillRect(canvas.width - 40, player2Y, 10, 100);\n            ctx.beginPath();\n            ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);\n            ctx.fill();\n        }\n\n        function update() {\n            ballX += ballSpeedX;\n            ballY += ballSpeedY;\n            // Collision with top and bottom\n            if (ballY <= 0 || ballY >= canvas.height) ballSpeedY = -ballSpeedY;\n            // Collision with paddles\n            if (ballX <= 40 && ballY > player1Y && ballY < player1Y + 100) ballSpeedX = -ballSpeedX;\n            if (ballX >= canvas.width - 40 && ballY > player2Y && ballY < player2Y + 100) ballSpeedX = -ballSpeedX;\n            // Scoring\n            if (ballX < 0) {\n                player2Score++;\n                resetBall();\n            } else if (ballX > canvas.width) {\n                player1Score++;\n                resetBall();\n            }\n            document.getElementById('player1Score').textContent = player1Score;\n            document.getElementById('player2Score').textContent = player2Score;\n        }\n\n        function resetBall() {\n            ballX = canvas.width / 2;\n            ballY = canvas.height / 2;\n            ballSpeedX = -ballSpeedX;\n        }\n\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        document.addEventListener('keydown', (event) => {\n            if(event.key === 'w' && player1Y > 0) player1Y -= 10;\n            if(event.key === 's' && player1Y < canvas.height - 100) player1Y += 10;\n            if(event.key === 'ArrowUp' && player2Y > 0) player2Y -= 10;\n            if(event.key === 'ArrowDown' && player2Y < canvas.height - 100) player2Y += 10;\n        });\n\n        gameLoop();\n    <\/script>\n</body>\n</html>
